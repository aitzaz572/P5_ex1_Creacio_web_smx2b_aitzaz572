<!DOCTYPE html> <!-- 
!DOCTYPE = indica al navegador que este documento es HTML5
<! = inicio de declaración especial
DOCTYPE = tipo de documento
html = lenguaje de marcado
--> 

<html lang="ca"> <!-- 
<html> = etiqueta raíz que contiene toda la página
lang="ca" = atributo que indica el idioma (ca = catalán)
-->

<head> <!-- 
<head> = cabecera de la página, contiene título, metadatos y enlaces a CSS/JS
-->

  <meta charset="UTF-8"> <!-- 
  <meta> = metadatos de la página
  charset="UTF-8" = codificación de caracteres, permite tildes y símbolos
  -->

  <title>Javascript - Portal Web</title> <!-- 
  <title> = título visible en la pestaña del navegador
  Javascript - Portal Web = texto que verá el usuario
  -->

  <!-- Petit script realitzat amb JAVASCRIPT que mostra una finestra emergent al obrir el document amb el navegador -->
  <script type="text/javascript"> <!-- 
  <script> = etiqueta que indica código JavaScript
  type="text/javascript" = atributo que indica que el lenguaje es JavaScript
  -->
    // Imprimira la cadena de texto en una ventana emergente
    alert('Hola a tothom, això és JAVASCRIPT!'); 
    // alert() = función de JavaScript que muestra un mensaje emergente
    // 'Hola a tothom, això és JAVASCRIPT!' = texto que verá el usuario
  </script> <!-- cierre del script -->

</head> <!-- cierre de cabecera -->

<body> <!-- 
<body> = cuerpo visible de la página
-->

  <!-- Menú de navegación -->
  <ul> <!-- lista desordenada -->
    <li><a href="../index.html">Inici</a></li> <!-- enlace a la página principal -->
    <li><a href="enllacos.html">Enllaços</a></li> <!-- enlace a página de enlaces -->
    <li><a href="taules.html">Taules</a></li> <!-- enlace a página de tablas -->
    <li><a href="javascript.html">Javascript</a></li> <!-- enlace a sí misma -->
  </ul> <!-- cierre de lista -->

  <h1>Exemple de Javascript</h1> <!-- título de la página -->

  <p>Aquesta plana mostra un exemple amb un alert de Javascript.</p> <!-- 
  <p> = párrafo
  Esta frase describe lo que hace la página
  </p> = cierre del párrafo
  -->

</body> <!-- cierre del cuerpo -->
</html> <!-- cierre de documento -->
