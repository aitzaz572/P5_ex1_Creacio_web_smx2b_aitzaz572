<!DOCTYPE html> <!-- 
! = indica comentario para el navegador
DOCTYPE = define el tipo de documento
html = indica que es HTML5
-->

<html lang="ca"> <!-- 
<html> = etiqueta raíz que contiene toda la página
lang="ca" = atributo que indica el idioma de la página (ca = catalán)
-->

<head> <!-- 
<head> = cabecera de la página, contiene metadatos, título y enlaces a CSS/JS
-->
  <meta charset="UTF-8"> <!-- 
  <meta> = etiqueta de metadatos
  charset="UTF-8" = codificación de caracteres, permite acentos y símbolos
  -->
  <title>Portal Web</title> <!-- 
  <title> = título que aparece en la pestaña del navegador
  Portal Web = texto visible en la pestaña
  -->
</head>

<body> <!-- 
<body> = cuerpo de la página, contiene todo lo visible para el usuario
-->

  <!-- Menú de navegación -->
  <ul> <!-- 
  <ul> = lista desordenada
  -->
    <li> <!-- 
    <li> = elemento de la lista
    -->
      <a href="index.html">Inici</a> <!-- 
      <a> = anchor = enlace
      href="index.html" = dirección del enlace, apunta a index.html
      Inici = texto visible del enlace
      -->
    </li>

    <li><a href="pagines/enllacos.html">Enllaços</a></li> <!-- enlace relativo a carpeta "pagines" -->
    <li><a href="pagines/taules.html">Taules</a></li> <!-- enlace relativo a tabla -->
    <li><a href="pagines/javascript.html">Javascript</a></li> <!-- enlace relativo a JS -->
  </ul>

  <h1>Benvinguts al Portal</h1> <!-- 
  <h1> = título principal
  Benvinguts al Portal = texto visible
  -->

  <p>Això és un paràgraf d'exemple.</p> <!-- 
  <p> = párrafo
  Això és un paràgraf d'exemple. = texto dentro del párrafo
  -->

</body>
</html>
